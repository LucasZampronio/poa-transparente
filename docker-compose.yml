services:
  postgres:
    image: postgres:16
    container_name: poa-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-poa_transparente}
      POSTGRES_USER: ${POSTGRES_USER:-poa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-poa}
    ports:
      - "5432:5432"
    volumes:
      - ./data/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-poa} -d ${POSTGRES_DB:-poa_transparente}"]
      interval: 5s
      timeout: 5s
      retries: 5

  etl:
    build:
      context: ./etl
    container_name: poa-etl
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-poa}:${POSTGRES_PASSWORD:-poa}@postgres:5432/${POSTGRES_DB:-poa_transparente}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./api
    container_name: poa-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-poa}:${POSTGRES_PASSWORD:-poa}@postgres:5432/${POSTGRES_DB:-poa_transparente}
      PORTAL_TRANSPARENCIA_API_KEY: ${PORTAL_TRANSPARENCIA_API_KEY}
      CONECTA_GOV_TOKEN: ${CONECTA_GOV_TOKEN}
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - etl

  web:
    build:
      context: ./web
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost}
    container_name: poa-web
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - api

  openbao:
    image: ghcr.io/openbao/openbao:latest
    container_name: poa-openbao
    ports:
      - "8200:8200"
    environment:
      BAO_UI: "true"
    volumes:
      - ./infra/openbao/data:/bao/data
      - ./infra/openbao/config/bao.hcl:/bao/config/bao.hcl
    command: ["bao", "server", "-config=/bao/config/bao.hcl"]
    cap_add:
      - IPC_LOCK
    restart: always

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: poa-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.3.0
    container_name: poa-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - ./infra/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
