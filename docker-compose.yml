services:
  postgres:
    image: postgres:16
    container_name: poa-postgres
    environment:
      POSTGRES_DB: poa_transparente
      POSTGRES_USER: poa
      POSTGRES_PASSWORD: poa
    ports:
      - "5432:5432"
    volumes:
      - ./data/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poa -d poa_transparente"]
      interval: 5s
      timeout: 5s
      retries: 5

  etl:
    build:
      context: ./etl
    container_name: poa-etl
    environment:
      DATABASE_URL: postgresql://poa:poa@postgres:5432/poa_transparente
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./api
    container_name: poa-api
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://poa:poa@postgres:5432/poa_transparente
      PORTAL_TRANSPARENCIA_API_KEY: ${PORTAL_TRANSPARENCIA_API_KEY}
      CONECTA_GOV_TOKEN: ${CONECTA_GOV_TOKEN}
    expose:
      - "4000"
    depends_on:
      - postgres
      - etl

  web:
    build:
      context: ./web
    container_name: poa-web
    environment:
      - VITE_API_URL=http://163.176.226.58
    expose:
      - "5173"
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - api

  proxy:
    image: nginx:alpine
    container_name: poa-proxy
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: poa-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.3.0
    container_name: poa-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - ./infra/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
