name: CI/CD Pipeline - Deploy to OCI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './api/package-lock.json'

      - name: Install API Dependencies
        working-directory: ./api
        run: npm install

      - name: Build API
        working-directory: ./api
        run: npm run build

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to OCI via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            # Verifica se o Git está instalado (fallback caso a VM seja nova)
            if ! command -v git &> /dev/null; then
              echo "⚠️ Git não encontrado. Tentando instalação manual..."
              sudo dnf install -y git || sudo apt-get update && sudo apt-get install -y git
            fi

            # Clone ou Pull do repositório
            if [ ! -d "$HOME/poa-transparente" ]; then
              echo "🚀 Realizando clone inicial do repositório..."
              git clone https://github.com/${{ github.repository }}.git "$HOME/poa-transparente"
            fi
            
            cd "$HOME/poa-transparente"
            git pull origin main
            
            # Garante que o Docker está pronto
            if ! command -v docker &> /dev/null; then
              echo "⚠️ Docker não encontrado. Instalando..."
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker $USER
            fi

            # Exporta variáveis de ambiente necessárias para o Docker Compose
            export PORTAL_TRANSPARENCIA_API_KEY="${{ secrets.PORTAL_TRANSPARENCIA_API_KEY }}"
            export CONECTA_GOV_TOKEN="${{ secrets.CONECTA_GOV_TOKEN }}"
            
            # Reconstroi e sobe os containers
            sudo docker compose down
            sudo docker compose up -d --build
            
            # Limpeza de imagens órfãs
            sudo docker image prune -f
