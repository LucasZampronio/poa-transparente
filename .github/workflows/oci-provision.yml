name: "OCI ARM Fishing - Try Every Hour"

on:
  schedule:
    - cron: '0 * * * *' # Roda no minuto 0 de cada hora
  workflow_dispatch: # Permite rodar clicando no botão no GitHub

jobs:
  try-provision:
    runs-on: ubuntu-latest
    env:
      OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_API_KEY }}
      OCI_CLI_REGION: ${{ secrets.OCI_REGION }}
    steps:
      - name: Setup OCI CLI
        uses: oracle-actions/run-oci-cli-command@v1
        with:
          command: '--version' # Minimal command to trigger CLI installation and config

      - name: "Try Launch Instance"
        run: |
          # Tentativa de criação via CLI
          # Se falhar por falta de capacidade, o script continua e não marca como falha do job
          oci compute instance launch \
            --availability-domain "${{ secrets.OCI_AD }}" \
            --compartment-id "${{ secrets.OCI_COMPARTMENT_OCID }}" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"cpus": 4, "memoryInGBs": 24}' \
            --image-id "${{ secrets.OCI_IMAGE_OCID }}" \
            --subnet-id "${{ secrets.OCI_SUBNET_OCID }}" \
            --assign-public-ip true \
            --display-name "poa-transparente-prod" \
            --ssh-authorized-keys-file <(echo "${{ secrets.SSH_PUBLIC_KEY }}") \
            || echo "Sem capacidade na Oracle Cloud agora. Tentando novamente na próxima hora."
