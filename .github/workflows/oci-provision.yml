name: "OCI ARM Fishing - Try Every Hour"

on:
  schedule:
    - cron: '0 * * * *' # Roda no minuto 0 de cada hora
  workflow_dispatch: # Permite rodar clicando no botão no GitHub

jobs:
  try-provision:
    runs-on: ubuntu-latest
    env:
      OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_API_KEY }}
      OCI_CLI_REGION: ${{ secrets.OCI_REGION }}
    steps:
      - name: "Clean OCI Secrets"
        run: |
          echo "OCI_CLI_USER=$(echo "${{ secrets.OCI_USER_OCID }}" | tr -d '\r\n ')" >> $GITHUB_ENV
          echo "OCI_CLI_TENANCY=$(echo "${{ secrets.OCI_TENANCY_OCID }}" | tr -d '\r\n ')" >> $GITHUB_ENV
          echo "OCI_CLI_FINGERPRINT=$(echo "${{ secrets.OCI_FINGERPRINT }}" | tr -d '\r\n ')" >> $GITHUB_ENV
          echo "OCI_CLI_REGION=$(echo "${{ secrets.OCI_REGION }}" | tr -d '\r\n ')" >> $GITHUB_ENV
          echo "OCI_COMPARTMENT=$(echo "${{ secrets.OCI_COMPARTMENT_OCID }}" | tr -d '\r\n ')" >> $GITHUB_ENV
          echo "OCI_SUBNET_SECRET=$(echo "${{ secrets.OCI_SUBNET_OCID }}" | tr -d '\r\n ')" >> $GITHUB_ENV

      - name: Setup OCI CLI
        uses: oracle-actions/run-oci-cli-command@v1.3.2
        with:
          command: '--version'

      - name: "Auto-Discover OCI Resources"
        run: |
          echo "Iniciando descoberta automática de recursos..."
          AD_NAME=$(oci iam availability-domain list --query 'data[0].name' --raw-output)
          echo "AD Encontrado: $AD_NAME"
          echo "OCI_AD=$AD_NAME" >> $GITHUB_ENV

          IMAGE_ID=$(oci compute image list \
            --compartment-id "$OCI_COMPARTMENT" \
            --operating-system "Oracle Linux" \
            --operating-system-version "9" \
            --shape "VM.Standard.A1.Flex" \
            --sort-by "TIMECREATED" \
            --query 'data[0].id' --raw-output)
          echo "Imagem Encontrada: $IMAGE_ID"
          echo "OCI_IMAGE=$IMAGE_ID" >> $GITHUB_ENV

          # Tenta usar o secret primeiro, se não existir, tenta descobrir
          if [ -n "$OCI_SUBNET_SECRET" ]; then
            echo "Usando Subnet configurada via Secret: $OCI_SUBNET_SECRET"
            echo "OCI_SUBNET=$OCI_SUBNET_SECRET" >> $GITHUB_ENV
          else
            echo "Secret OCI_SUBNET_OCID não encontrado. Tentando auto-descoberta..."
            SUBNET_ID=$(oci network subnet list --compartment-id "$OCI_COMPARTMENT" \
              --query "data[?prohibitPublicIpOnVnic==\`false\`].id | [0]" --raw-output)
            
            if [ -z "$SUBNET_ID" ] || [ "$SUBNET_ID" == "null" ]; then
              echo "::error::Não foi possível encontrar uma Subnet Pública (via Secret ou Auto-Descoberta). Verifique sua rede na OCI."
              exit 1
            fi
            echo "Subnet Encontrada via Auto-Descoberta: $SUBNET_ID"
            echo "OCI_SUBNET=$SUBNET_ID" >> $GITHUB_ENV
          fi

      - name: "Try Launch Instance"
        run: |
          SSH_KEY=$(echo "${{ secrets.SSH_PUBLIC_KEY }}" | xargs)
          echo "Tentando lançar instância ARM..."
          
          if oci compute instance launch \
            --availability-domain "$OCI_AD" \
            --compartment-id "$OCI_COMPARTMENT" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus":1,"memoryInGBs":6}' \
            --image-id "$OCI_IMAGE" \
            --subnet-id "$OCI_SUBNET" \
            --assign-public-ip true \
            --metadata "{\"ssh_authorized_keys\":\"$SSH_KEY\"}" \
            --display-name "poa-transparente-prod" 2>error.log; then
            echo "Instância criada com sucesso!"
          else
            ERROR_MSG=$(cat error.log)
            echo "Erro detectado: $ERROR_MSG"
            
            if echo "$ERROR_MSG" | grep -iq "Out of capacity"; then
              echo "::error title=OCI Capacity Error::Sem capacidade ARM agora. O robô tentará novamente na próxima hora."
            else
              echo "::error title=OCI CLI Error::Falha no comando. Verifique os logs."
            fi
            exit 0
          fi
