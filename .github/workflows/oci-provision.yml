name: "OCI ARM Fishing - Try Every Hour"

on:
  schedule:
    - cron: '0 * * * *' # Roda no minuto 0 de cada hora
  workflow_dispatch: # Permite rodar clicando no botão no GitHub

jobs:
  try-provision:
    runs-on: ubuntu-latest
    env:
      OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_API_KEY }}
      OCI_CLI_REGION: ${{ secrets.OCI_REGION }}
    steps:
      - name: "Clean OCI Secrets"
        run: |
          # Higieniza TODOS os inputs para remover espaços, tabs ou quebras de linha invisíveis
          echo "OCI_CLI_USER=$(echo "${{ secrets.OCI_USER_OCID }}" | tr -d '\r\n ')" >> $GITHUB_ENV
          echo "OCI_CLI_TENANCY=$(echo "${{ secrets.OCI_TENANCY_OCID }}" | tr -d '\r\n ')" >> $GITHUB_ENV
          echo "OCI_CLI_FINGERPRINT=$(echo "${{ secrets.OCI_FINGERPRINT }}" | tr -d '\r\n ')" >> $GITHUB_ENV
          echo "OCI_CLI_REGION=$(echo "${{ secrets.OCI_REGION }}" | tr -d '\r\n ')" >> $GITHUB_ENV
          
          # Limpeza dos parâmetros de criação
          echo "OCI_AD=$(echo "${{ secrets.OCI_AD }}" | tr -d '\r\n ')" >> $GITHUB_ENV
          echo "OCI_COMPARTMENT=$(echo "${{ secrets.OCI_COMPARTMENT_OCID }}" | tr -d '\r\n ')" >> $GITHUB_ENV
          echo "OCI_IMAGE=$(echo "${{ secrets.OCI_IMAGE_OCID }}" | tr -d '\r\n ')" >> $GITHUB_ENV
          echo "OCI_SUBNET=$(echo "${{ secrets.OCI_SUBNET_OCID }}" | tr -d '\r\n ')" >> $GITHUB_ENV

      - name: Setup OCI CLI
        uses: oracle-actions/run-oci-cli-command@v1.3.2
        with:
          command: '--version'

      - name: "Try Launch Instance"
        run: |
          # Usa as variáveis de ambiente higienizadas
          # Construção robusta dos detalhes da VNIC e Metadata
          VNIC_DETAILS=$(printf '{"subnetId":"%s","assignPublicIp":true,"displayName":"poa-vnic"}' "$OCI_SUBNET")
          SHAPE_CONFIG='{"ocpus":4,"memoryInGBs":24}'
          METADATA=$(printf '{"ssh_authorized_keys":"%s"}' "$(echo "${{ secrets.SSH_PUBLIC_KEY }}" | xargs)")

          echo "Iniciando tentativa de lançamento da instância ARM..."
          
          if oci compute instance launch \
            --availability-domain "$OCI_AD" \
            --compartment-id "$OCI_COMPARTMENT" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config "$SHAPE_CONFIG" \
            --image-id "$OCI_IMAGE" \
            --create-vnic-details "$VNIC_DETAILS" \
            --metadata "$METADATA" \
            --display-name "poa-transparente-prod" 2>error.log; then
            echo "Instância criada com sucesso!"
          else
            ERROR_MSG=$(cat error.log)
            echo "Erro detectado. Analisando..."
            
            if echo "$ERROR_MSG" | grep -iq "Out of capacity"; then
              echo "::error title=OCI Capacity Error::Sem capacidade para instâncias ARM agora. Tentando na próxima hora."
            elif echo "$ERROR_MSG" | grep -iq "NotAuthorizedOrNotFound"; then
              echo "::error title=OCI Auth Error::ID de Compartment, Imagem ou Subnet não encontrado ou sem permissão. Verifique os OCIDs e a Região."
            elif echo "$ERROR_MSG" | grep -iq "CannotParseRequest"; then
              echo "::error title=OCI Payload Error::Erro de formatação no request (400). Tentando rodar com --debug para diagnóstico..."
              oci compute instance launch \
                --availability-domain "$OCI_AD" \
                --compartment-id "$OCI_COMPARTMENT" \
                --shape "VM.Standard.A1.Flex" \
                --shape-config "$SHAPE_CONFIG" \
                --image-id "$OCI_IMAGE" \
                --create-vnic-details "$VNIC_DETAILS" \
                --metadata "$METADATA" \
                --display-name "poa-transparente-prod" --debug || true
            else
              echo "::error title=OCI CLI Error::Erro desconhecido. Detalhes: $ERROR_MSG"
            fi
            exit 0
          fi
